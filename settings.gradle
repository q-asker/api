rootProject.name = 'q-asker'

include ':app', ':global',
        ':auth-api', ':auth-impl',
        ':aws-api', ':aws-impl',
        ':quiz-api', ':quiz-impl',
        ':quiz-history-api', ':quiz-history-impl',
        ':util-api', ':util-impl',
        ':ai-api', ':ai-impl',
        ':board-api', ':board-impl'

project(':app').projectDir = file('app')
project(':global').projectDir = file('modules/global')

project(':auth-api').projectDir = file('modules/auth/api')
project(':auth-impl').projectDir = file('modules/auth/impl')

project(':aws-api').projectDir = file('modules/aws/api')
project(':aws-impl').projectDir = file('modules/aws/impl')

project(':quiz-api').projectDir = file('modules/quiz/api')
project(':quiz-impl').projectDir = file('modules/quiz/impl')

project(':quiz-history-api').projectDir = file('modules/quiz-history/api')
project(':quiz-history-impl').projectDir = file('modules/quiz-history/impl')

project(':util-api').projectDir = file('modules/util/api')
project(':util-impl').projectDir = file('modules/util/impl')

project(':ai-api').projectDir = file('modules/ai/api')
project(':ai-impl').projectDir = file('modules/ai/impl')

project(':board-api').projectDir = file('modules/board/api')
project(':board-impl').projectDir = file('modules/board/impl')

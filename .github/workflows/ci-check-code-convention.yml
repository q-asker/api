name: CI

on:
  pull_request:
    branches:
      - develop
      - main

jobs:
  ci:
    name: 포맷 검증 & 빌드 & 테스트
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: JDK 21 설정
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Gradle 설정
        uses: gradle/actions/setup-gradle@v4

      - name: 포맷 검증 & 빌드 & 테스트
        run: ./gradlew spotlessCheck build --build-cache --parallel

name: CI - PII 분류 커버리지

# 새 컬럼이 pii_classification 분류 없이 들어오는 걸 막는 게이트.
# 마이그레이션(스키마 + 분류 시드 V14·V17…)을 실제 MySQL 에 버전 순서로 적용한 뒤,
# information_schema 의 모든 컬럼이 pii_classification 에 있는지 검사한다.
# 미분류가 있으면 실패 → 마스킹(masked-export)에서 deny-by-default·크래시로 새는 걸 사전 차단.
on:
  pull_request:
    branches: [develop, main]
    paths:
      - "app/src/main/resources/db/migration/**"

jobs:
  pii-coverage:
    name: pii_classification 커버리지 게이트
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: qaskerdb
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h127.0.0.1 -uroot -ppassword"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=20

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: 마이그레이션 적용 (V1..최신, 버전 순서)
        run: |
          set -euo pipefail
          for f in $(ls app/src/main/resources/db/migration/V*.sql | sort -V); do
            docker run -i --rm --network host mysql:8.0 \
              mysql -h127.0.0.1 -uroot -ppassword qaskerdb < "$f" \
              || { echo "::error::마이그레이션 적용 실패: $f"; exit 1; }
          done
          echo "✅ 마이그레이션 적용 완료"

      - name: 커버리지 검사 (미분류 컬럼 있으면 실패)
        run: |
          set -euo pipefail
          MISSING=$(docker run --rm --network host mysql:8.0 \
            mysql -h127.0.0.1 -uroot -ppassword qaskerdb -N -e "
              SELECT CONCAT(c.table_name, '.', c.column_name)
              FROM information_schema.columns c
              LEFT JOIN pii_classification p
                ON p.table_name = c.table_name AND p.column_name = c.column_name
              WHERE c.table_schema = 'qaskerdb'
                AND c.table_name NOT IN ('flyway_schema_history', 'pii_classification')
                AND p.strategy IS NULL
              ORDER BY 1;")
          if [ -n "$MISSING" ]; then
            echo "::error::pii_classification 에 분류되지 않은 컬럼이 있습니다:"
            echo "$MISSING" | sed 's/^/  - /'
            echo ""
            echo "새 컬럼은 db/migration 에 pii_classification 분류 시드(V__)를 함께 추가하세요."
            echo "  전략: HASH(식별자·FK 정합) / FAKE / REDACT(자유 텍스트) / SAFE(비PII·숫자·타임스탬프) / DROP"
            exit 1
          fi
          echo "✅ 전 도메인 컬럼이 pii_classification 에 분류됨"

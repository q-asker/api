name: Feedback Issue Review

# feedback_board에서 자동 등록된 피드백 이슈에 팀 멤버가 `/review` 코멘트를 남기면
# Claude가 프론트엔드(q-asker/client) + 백엔드(q-asker/api)의 CLAUDE.md와 실제 코드를 읽고
# "프론트엔드 작업 / 백엔드 작업"으로 나눈 분석 댓글을 자동 게시한다.
# Max 구독 OAuth 토큰을 사용해 별도 API 비용은 발생하지 않는다.
on:
  issue_comment:
    types: [created]

jobs:
  review:
    # 실행 조건을 모두 만족할 때만 동작:
    # 1) PR 코멘트가 아닌 순수 이슈 코멘트일 것 (issue_comment는 PR에도 발생하므로 구분)
    # 2) 코멘트 본문이 '/review'로 시작할 것
    # 3) 작성자가 저장소 오너/멤버/협력자일 것 (외부인 트리거 차단 → 토큰 보호)
    if: >-
      github.event.issue.pull_request == null &&
      startsWith(github.event.comment.body, '/review') &&
      contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)

    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: read # 코드 읽기
      issues: write # 이슈 코멘트 작성
      pull-requests: write # claude-code-action 내부 처리용
      id-token: write # OIDC 토큰 발급 (Claude Code Action 필수)

    steps:
      - name: Checkout backend (q-asker/api)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0 # 백엔드 전체 코드 확인 가능하도록

      - name: Checkout frontend (q-asker/client)
        # 프론트엔드 코드까지 읽어야 정확한 작업 분해가 가능하다.
        # FRONTEND_REPO_TOKEN(= q-asker/client read 권한 PAT)이 없으면 실패하지만,
        # continue-on-error로 백엔드 단독 분석으로라도 진행한다(프롬프트에서 한계를 명시).
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        continue-on-error: true
        with:
          repository: q-asker/client
          token: ${{ secrets.FRONTEND_REPO_TOKEN }}
          path: _frontend
          fetch-depth: 1

      - name: Acknowledge /review with reaction
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            "/repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions" \
            -f content='eyes'

      - name: Run Claude feedback analysis
        uses: anthropics/claude-code-action@2fee15510437d71399d9139ed60433470484a8fb # v1
        with:
          # Max 구독 OAuth 토큰 사용 (renovate-impact-analysis.yml과 동일 시크릿)
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # 프론트/백 양쪽 구조를 읽고 작업을 분해하는 작업이라 코드 이해력이 필요.
          # 가장 정밀한 분석을 위해 Opus 4.8 사용.
          claude_args: "--model claude-opus-4-8"
          # 분석 결과를 이슈 코멘트로 자동 게시 (Claude가 직접 gh 호출할 필요 없음)
          track_progress: true
          # 디버깅용 — 안정화 후 false로 전환
          show_full_output: true
          prompt: |
            너는 q-asker 서비스의 시니어 풀스택 엔지니어이자 프로덕트 사고에 능한 퍼실리테이터다.
            사용자 피드백으로 자동 생성된 GitHub 이슈를 읽고, 곧바로 구현 방법을 확정하지 말고
            "무엇을 왜 만들지"를 팀이 함께 구체화할 수 있도록 브레인스토밍 관점의 분석을 작성하라.
            너의 최종 응답은 자동으로 이 이슈의 코멘트로 게시되므로, 추가로 'gh issue comment'
            같은 명령을 호출하지 말고 응답 본문에 보고서를 그대로 작성하면 된다.

            ## 가장 중요한 원칙 — 섣부른 구현 확정 금지 (lock-in 방지)
            - **구체적 구현 방법을 규정하지 마라.** 특정 파일 경로, 클래스/컴포넌트명, 엔드포인트
              시그니처(예: `PATCH /x/{id}`), DB 마이그레이션 파일명, 엔티티/DTO 필드 등
              "이렇게 고쳐라" 식의 코드 수준 지시는 쓰지 않는다.
            - 코드를 읽는 것은 **현재 상태를 이해**하기 위함이다. 발견한 사실은 "지금 이렇게 동작한다"는
              맥락으로만 서술하고, 곧바로 해결책 구현으로 못 박지 않는다.
            - 목표는 정답 하나를 제시하는 게 아니라, **선택지와 트레이드오프, 결정해야 할 논점**을
              드러내 팀의 논의를 돕는 것이다.

            ## 진행 절차
            1. 이 이슈(번호: ${{ github.event.issue.number }})의 제목·본문에서 사용자 피드백 원문과
               그 이면의 진짜 의도를 파악한다. (필요 시 `gh issue view ${{ github.event.issue.number }}`)
            2. 백엔드(저장소 루트 `CLAUDE.md`, `modules/**`)와 프론트엔드(`_frontend/CLAUDE.md`,
               `_frontend/**`)를 훑어 **현재 어떻게 동작하는지**를 파악한다. `_frontend/`가 없거나 비어
               있으면 "프론트엔드 저장소 접근 불가"로 간주하고 그 한계를 명시한다.
            3. 피드백을 버그 / 개선 / 신규기능 중 무엇으로 볼지 분류한다.

            ## 출력 형식 (반드시 이 마크다운 구조로 최종 응답 작성)

            ```markdown
            ## 🤖 Claude 피드백 브레인스토밍

            ### 📌 피드백 요약
            - 원문 핵심 한두 줄 + 이면의 의도(재해석)
            - 분류: {버그 | 개선 | 신규기능}

            ### 💡 풀어야 할 문제 / 방향성
            - 여기서는 "무엇을 왜 푸는가"(문제 프레이밍)에 집중한다. 사용자가 진짜 원하는 가치가
              무엇인지, 그것을 충족할 수 있는 방향 2~3가지를 관점으로 제시. (해법 비교는 🔀에서만)

            # 프론트엔드 작업
            - 이쪽에서 다뤄야 할 논점·고려사항을 **방향 수준**으로 서술 (구현 세부 X)
            - 현재 동작 맥락 → 이 피드백이 건드리는 지점 → 생각해볼 방향/선택지
            - (변경 불필요하면) 해당 없음 (사유)

            # 백엔드 작업
            - 위와 동일하게 **방향 수준**으로 서술 (구현 세부 X)
            - (변경 불필요하면) 해당 없음 (사유)

            ### 🔀 접근 방식 옵션 · 트레이드오프
            - 여기서는 "어떻게 접근할지"(해법 후보)만 다룬다. 💡의 문제 프레이밍을 반복하지 말 것.
            - 핵심 축마다 2~3개 옵션으로 압축(과다 나열은 결정 피로 유발). 각 옵션의 장단점을
              비교로 제시하되 정답을 강요하지 않는다.

            ### ❓ 팀이 결정·확인해야 할 것
            - 원문만으로 불명확한 점, 범위·정책·UX와 관련해 팀이 정해야 할 열린 질문

            ### 📋 참고
            - 분석 모델: claude-opus-4-8
            - 프론트엔드 저장소 접근: {가능 | 불가}
            ```

            ## 작성 원칙
            - **응답의 첫 글자는 반드시 `#`이며, 곧바로 `## 🤖 Claude 피드백 브레인스토밍` 헤딩으로
              시작한다. 보고서 밖 텍스트는 0글자다.** 특히 코드 탐색·grep·파일 확인 결과를 보고하는
              문장을 헤딩 앞에 절대 쓰지 마라(금지 예: "Confirmed: …", "grep 결과 …", "I have
              everything I need", "이제 파악했다", "Let me produce…"). 그런 확인 내용이 필요하면
              헤딩 뒤 📌/💡 섹션 본문에 자연스럽게 녹인다. 응답은 오직 지정된 마크다운 보고서 하나다.
            - 구현 방법 확정 금지(위 원칙). 대신 방향·선택지·질문 중심으로 쓴다.
            - 현재 동작에 대한 사실은 코드로 확인된 것만 단정한다. 프론트엔드·백엔드 어느 쪽이든
              실제 코드로 확인하지 못한 동작은 "(추정)"이라고 명시한다.
            - 식별자(클래스/파일/컴포넌트명)를 콕 집어 "여길 이렇게 고쳐라"로 쓰지 말고,
              맥락 설명에 꼭 필요한 최소한만 언급한다.
            - 한국어로 자연스럽게. 간결하게. 불필요한 사족 금지.

  followup:
    # /review 분석 이후 팀 멤버가 '@claude <질문>' 으로 댓글을 남기면,
    # Claude가 이슈 스레드(이전 분석 포함) + 저장소 코드를 컨텍스트로 그 질문에 답한다(맥락 보강).
    # claude-code-action의 네이티브 멘션 모드 — prompt를 비워 두면 댓글 본문을 지시로 받는다.
    # (댓글 본문을 YAML에 문자열로 끼워넣지 않으므로 스크립트 인젝션 위험이 없다.)
    # 실행 조건:
    # 1) PR 코멘트가 아닌 순수 이슈 코멘트일 것
    # 2) 코멘트에 '@claude' 가 포함될 것 (단, '/review'로 시작하면 review 잡이 담당하므로 제외)
    # 3) 작성자가 저장소 오너/멤버/협력자일 것
    if: >-
      github.event.issue.pull_request == null &&
      contains(github.event.comment.body, '@claude') &&
      !startsWith(github.event.comment.body, '/review') &&
      contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)

    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: read
      issues: write
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout backend (q-asker/api)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Checkout frontend (q-asker/client)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        continue-on-error: true
        with:
          repository: q-asker/client
          token: ${{ secrets.FRONTEND_REPO_TOKEN }}
          path: _frontend
          fetch-depth: 1

      - name: Run Claude follow-up (mention mode)
        uses: anthropics/claude-code-action@2fee15510437d71399d9139ed60433470484a8fb # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # /review와 동일하게 Opus 4.8 사용.
          claude_args: "--model claude-opus-4-8"
          # prompt 미지정 → '@claude' 멘션 네이티브 모드. 댓글 본문이 곧 지시가 되며,
          # 이슈 스레드와 체크아웃된 저장소(백엔드=루트, 프론트엔드=_frontend/)를 탐색해 답한다.
          show_full_output: true

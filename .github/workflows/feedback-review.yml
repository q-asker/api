name: Feedback Issue Review

# feedback_board에서 자동 등록된 피드백 이슈에 팀 멤버가 `/review` 코멘트를 남기면
# Claude가 프론트엔드(q-asker/client) + 백엔드(q-asker/api)의 CLAUDE.md와 실제 코드를 읽고
# "프론트엔드 작업 / 백엔드 작업"으로 나눈 분석 댓글을 자동 게시한다.
# Max 구독 OAuth 토큰을 사용해 별도 API 비용은 발생하지 않는다.
on:
  issue_comment:
    types: [created]

jobs:
  review:
    # 실행 조건을 모두 만족할 때만 동작:
    # 1) PR 코멘트가 아닌 순수 이슈 코멘트일 것 (issue_comment는 PR에도 발생하므로 구분)
    # 2) 코멘트 본문이 '/review'로 시작할 것
    # 3) 작성자가 저장소 오너/멤버/협력자일 것 (외부인 트리거 차단 → 토큰 보호)
    if: >-
      github.event.issue.pull_request == null &&
      startsWith(github.event.comment.body, '/review') &&
      contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)

    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: read # 코드 읽기
      issues: write # 이슈 코멘트 작성
      pull-requests: write # claude-code-action 내부 처리용
      id-token: write # OIDC 토큰 발급 (Claude Code Action 필수)

    steps:
      - name: Checkout backend (q-asker/api)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0 # 백엔드 전체 코드 확인 가능하도록

      - name: Checkout frontend (q-asker/client)
        # 프론트엔드 코드까지 읽어야 정확한 작업 분해가 가능하다.
        # FRONTEND_REPO_TOKEN(= q-asker/client read 권한 PAT)이 없으면 실패하지만,
        # continue-on-error로 백엔드 단독 분석으로라도 진행한다(프롬프트에서 한계를 명시).
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        continue-on-error: true
        with:
          repository: q-asker/client
          token: ${{ secrets.FRONTEND_REPO_TOKEN }}
          path: _frontend
          fetch-depth: 1

      - name: Acknowledge /review with reaction
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            "/repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions" \
            -f content='eyes'

      - name: Run Claude feedback analysis
        uses: anthropics/claude-code-action@2fee15510437d71399d9139ed60433470484a8fb # v1
        with:
          # Max 구독 OAuth 토큰 사용 (renovate-impact-analysis.yml과 동일 시크릿)
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # 프론트/백 양쪽 구조를 읽고 작업을 분해하는 작업이라 코드 이해력이 필요.
          # 가장 정밀한 분석을 위해 Opus 4.8 사용.
          claude_args: "--model claude-opus-4-8"
          # 분석 결과를 이슈 코멘트로 자동 게시 (Claude가 직접 gh 호출할 필요 없음)
          track_progress: true
          # 디버깅용 — 안정화 후 false로 전환
          show_full_output: true
          prompt: |
            너는 q-asker 서비스의 시니어 풀스택 엔지니어다.
            사용자 피드백으로 자동 생성된 GitHub 이슈를 분석하여, 프론트엔드와 백엔드가 각각
            무엇을 해야 하는지 실행 가능한 작업으로 분해하라.
            너의 최종 응답은 자동으로 이 이슈의 코멘트로 게시되므로, 추가로 'gh issue comment'
            같은 명령을 호출하지 말고 응답 본문에 보고서를 그대로 작성하면 된다.

            ## 컨텍스트 수집 절차

            1. **피드백 원문 파악**
               - 이 이슈(번호: ${{ github.event.issue.number }})의 제목과 본문을 읽어 사용자 피드백 원문을 파악한다.
               - 필요하면 `gh issue view ${{ github.event.issue.number }}` 로 원문을 확인한다.

            2. **백엔드 구조 파악**
               - 저장소 루트의 `CLAUDE.md`(q-asker/api)를 읽어 멀티모듈 구조/기술 스택을 이해한다.
               - 관련 모듈의 실제 코드(`modules/**`)를 grep으로 확인한다.

            3. **프론트엔드 구조 파악**
               - `_frontend/CLAUDE.md`(q-asker/client)를 읽어 구조/기술 스택을 이해하고,
                 관련 코드(`_frontend/**`)를 grep으로 확인한다.
               - `_frontend/` 디렉터리가 없거나 비어 있으면 "프론트엔드 저장소 접근 불가"로 간주하고,
                 피드백 원문과 백엔드 계약을 근거로 최선을 다해 추론하되 그 한계를 명시하라.

            ## 분석 원칙
            - 피드백이 **버그 / 개선 / 신규기능** 중 무엇인지 먼저 분류한다.
            - 프론트엔드 작업과 백엔드 작업을 명확히 분리한다. 한쪽만 필요하면 "해당 없음 (사유)"로 적는다.
            - 각 작업 항목은 **실제로 확인된 파일/모듈/컴포넌트 경로**를 근거로 제시한다. 추측만으로 단정하지 말 것.
            - API 변경이 필요하면 프론트/백 양쪽 계약 변경 사항을 함께 기술한다.

            ## 출력 형식 (반드시 이 마크다운 구조로 최종 응답 작성)

            ```markdown
            ## 🤖 Claude 피드백 분석

            ### 📌 피드백 요약
            - 원문 핵심 한두 줄 요약
            - 분류: {버그 | 개선 | 신규기능}

            # 프론트엔드 작업
            - [ ] 작업 항목 — `근거 파일/컴포넌트 경로`, 한 줄 설명
            - (변경 불필요 시) 해당 없음 (사유)

            # 백엔드 작업
            - [ ] 작업 항목 — `근거 모듈/클래스 경로`, 한 줄 설명
            - (변경 불필요 시) 해당 없음 (사유)

            ### 🔗 API/계약 영향
            - 엔드포인트/DTO 변경 필요 여부. 없으면 "없음".

            ### ⚠️ 리스크 & 확인 필요
            - 모호하거나 추가 확인이 필요한 점

            ### 📋 참고
            - 분석 모델: claude-opus-4-8
            - 프론트엔드 저장소 접근: {가능 | 불가}
            ```

            ## 작성 원칙
            - 추측 금지. **코드에서 실제로 확인된 근거만** 경로와 함께 제시한다.
            - 한국어로 자연스럽게. 클래스/파일/컴포넌트명 등 식별자는 원문 유지.
            - 간결하게. 불필요한 사족 금지.

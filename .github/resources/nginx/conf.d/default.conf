# HTTP → HTTPS 리다이렉트 + ACME challenge
server {
    listen 80;
    server_name api.q-asker.com;

    # Let's Encrypt 인증서 발급/갱신용
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 나머지 요청은 HTTPS로 리다이렉트
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS 서비스 포트 (외부 :443 → app-blue/green :8080)
server {
    listen 443 ssl;
    server_name api.q-asker.com;

    # SSL 인증서
    ssl_certificate /etc/letsencrypt/live/api.q-asker.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.q-asker.com/privkey.pem;

    # SSL 보안 설정
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # 바디 크기 제한
    client_max_body_size 100m;

    # [중요] 도커 내부 DNS 주소 (이게 없으면 변수 사용 시 502 뜸)
    resolver 127.0.0.11 valid=5s;

    # [핵심] service-url.inc 파일을 포함하여 $service_url 변수를 가져옴
    include /etc/nginx/conf.d/service-url.inc;

    # SSE 스트리밍 전용 (퀴즈 생성 진행률)
    location ~ ^/generation/[^/]+/stream$ {
        proxy_pass $service_url;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Origin $http_origin;
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding off;
        proxy_read_timeout 300s;
        gzip off;
    }

    location / {
        # Docker DNS가 $service_url(예: app-blue)을 내부 IP로 변환하여 전달
        proxy_pass $service_url;

        # 파일 업로드 시 Nginx가 전체 바디를 버퍼링하지 않고 즉시 백엔드로 스트리밍
        proxy_request_buffering off;

        # [헤더 설정] 실제 클라이언트의 정보를 Spring Boot에 전달하기 위함
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 1. 브라우저가 보낸 Origin(출처)을 백엔드에 그대로 전달
        proxy_set_header Origin $http_origin;

        # 2. Preflight(OPTIONS) 요청 시 사용하는 헤더들도 전달
        proxy_set_header Access-Control-Request-Method $http_access_control_request_method;
        proxy_set_header Access-Control-Request-Headers $http_access_control_request_headers;
    }
}

# Actuator 포트 (외부 :9090 → 앱 :9090)
# Prometheus가 이 포트로 스크레이핑
server {
    listen 9090;
    server_name localhost;

    resolver 127.0.0.11 valid=5s;

    include /etc/nginx/conf.d/service-url.inc;

    location / {
        proxy_pass $actuator_url;
    }
}

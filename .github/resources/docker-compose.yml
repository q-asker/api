services:
  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "8080:8080"
      - "9090:9090"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d

  app-blue:
    image: ${DOCKER_IMAGE}
    container_name: app-blue
    environment:
      - SPRING_PROFILES_ACTIVE=prod,blue
      - JASYPT_ENCRYPTOR_PASSWORD=${JASYPT_ENCRYPTOR_PASSWORD}
    ports:
      - "${BLUE_PORT}:8080"
      - "4001:4000"
    volumes:
      - glowroot-blue-data:/app/glowroot/data
      - ./glowroot/admin.json:/app/glowroot/admin.json

  app-green:
    image: ${DOCKER_IMAGE}
    container_name: app-green
    environment:
      - SPRING_PROFILES_ACTIVE=prod,green
      - JASYPT_ENCRYPTOR_PASSWORD=${JASYPT_ENCRYPTOR_PASSWORD}
    ports:
      - "${GREEN_PORT}:8080"
      - "4002:4000"
    volumes:
      - glowroot-green-data:/app/glowroot/data
      - ./glowroot/admin.json:/app/glowroot/admin.json

volumes:
  glowroot-blue-data:
  glowroot-green-data:

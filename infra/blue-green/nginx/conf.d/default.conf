set_real_ip_from 173.245.48.0/20;
set_real_ip_from 103.21.244.0/22;
set_real_ip_from 103.22.200.0/22;
set_real_ip_from 103.31.4.0/22;
set_real_ip_from 141.101.64.0/18;
set_real_ip_from 108.162.192.0/18;
set_real_ip_from 190.93.240.0/20;
set_real_ip_from 188.114.96.0/20;
set_real_ip_from 197.234.240.0/22;
set_real_ip_from 198.41.128.0/17;
set_real_ip_from 162.158.0.0/15;
set_real_ip_from 104.16.0.0/13;
set_real_ip_from 104.24.0.0/14;
set_real_ip_from 172.64.0.0/13;
set_real_ip_from 131.0.72.0/22;

# IPv6
set_real_ip_from 2400:cb00::/32;
set_real_ip_from 2606:4700::/32;
set_real_ip_from 2803:f800::/32;
set_real_ip_from 2405:b500::/32;
set_real_ip_from 2405:8100::/32;
set_real_ip_from 2a06:98c0::/29;
set_real_ip_from 2c0f:f248::/32;

real_ip_header CF-Connecting-IP;

# HTTP → HTTPS 리다이렉트
server {
    listen 80;
    server_name api.q-asker.com;

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS 서비스 포트 (외부 :443 → app-blue/green :8080)
server {
    listen 443 ssl;
    server_name api.q-asker.com;

    # SSL 인증서 (Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/api.q-asker.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.q-asker.com/privkey.pem;

    # SSL 인증서 (Cloudflare Origin CA) — 비활성화
    # ssl_certificate /etc/ssl/cloudflare/api.q-asker.com.pem;
    # ssl_certificate_key /etc/ssl/cloudflare/api.q-asker.com.key;

    # SSL 보안 설정
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # 바디 크기 제한
    client_max_body_size 100m;

    # [중요] 도커 내부 DNS 주소 (이게 없으면 변수 사용 시 502 뜸)
    resolver 127.0.0.11 valid=5s;

    # [핵심] service-url.inc 파일을 포함하여 $service_url 변수를 가져옴
    include /etc/nginx/conf.d/service-url.inc;

    # SSE 스트리밍 전용 (퀴즈 생성 진행률)
    location ~ ^/generation/[^/]+/stream$ {
        proxy_pass $service_url;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Origin $http_origin;
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding off;
        proxy_read_timeout 300s;
        gzip off;
    }

    location / {
        # Docker DNS가 $service_url(예: app-blue)을 내부 IP로 변환하여 전달
        proxy_pass $service_url;

        # 파일 업로드 시 Nginx가 전체 바디를 버퍼링하지 않고 즉시 백엔드로 스트리밍
        proxy_request_buffering off;

        # [헤더 설정] 실제 클라이언트의 정보를 Spring Boot에 전달하기 위함
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 1. 브라우저가 보낸 Origin(출처)을 백엔드에 그대로 전달
        proxy_set_header Origin $http_origin;

        # 2. Preflight(OPTIONS) 요청 시 사용하는 헤더들도 전달
        proxy_set_header Access-Control-Request-Method $http_access_control_request_method;
        proxy_set_header Access-Control-Request-Headers $http_access_control_request_headers;
    }
}

# Actuator 포트 (외부 :9090 → 앱 :9090)
# Prometheus가 이 포트로 스크레이핑
server {
    listen 9090;
    server_name localhost;

    resolver 127.0.0.11 valid=5s;

    include /etc/nginx/conf.d/service-url.inc;

    location / {
        proxy_pass $actuator_url;
    }
}

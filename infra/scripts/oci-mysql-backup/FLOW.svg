<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1780"
     font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="13">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#374151"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#DC2626"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#2563EB"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1000" height="1780" fill="#FAFAFA"/>

  <!-- Title -->
  <text x="500" y="35" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">
    systemctl start oci-mysql-backup.service — 실행 흐름
  </text>
  <text x="500" y="60" text-anchor="middle" font-size="12" fill="#6B7280">
    좌측 = 정상 경로 · 우측 = 실패 시 종료 코드 · 하단 = 관측 파이프라인 (비동기)
  </text>

  <!-- ── [0] 트리거 ── -->
  <g>
    <rect x="300" y="90" width="400" height="52" rx="8" fill="#EDE9FE" stroke="#7C3AED" stroke-width="1.5"/>
    <text x="500" y="112" text-anchor="middle" font-weight="600" fill="#5B21B6">[0] 트리거</text>
    <text x="500" y="130" text-anchor="middle" fill="#4C1D95">사용자 systemctl start · Timer 6h 주기</text>
  </g>
  <line x1="500" y1="142" x2="500" y2="170" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ── [1~3] systemd 사전 처리 ── -->
  <g>
    <rect x="220" y="170" width="560" height="130" rx="8" fill="#DBEAFE" stroke="#2563EB" stroke-width="1.5"/>
    <text x="500" y="192" text-anchor="middle" font-weight="600" fill="#1E40AF">[1]~[3] systemd 사전 처리 (PID 1)</text>
    <text x="240" y="220" fill="#1E3A8A">• unit 파싱 · EnvironmentFile 로드 (/etc/oci-mysql-backup/env)</text>
    <text x="240" y="240" fill="#1E3A8A">• 보안 강화: ProtectSystem=strict · ProtectHome · PrivateTmp · NoNewPrivileges</text>
    <text x="240" y="260" fill="#1E3A8A">• 리소스 제한: CPUQuota=50% · MemoryMax=512M</text>
    <text x="240" y="280" fill="#1E3A8A">• fork + setuid(oci-mysql-backup) · HOME=/var/lib/oci-mysql-backup</text>
  </g>
  <line x1="500" y1="300" x2="500" y2="328" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ── [4] backup.sh 실행 ── -->
  <g>
    <rect x="300" y="328" width="400" height="42" rx="8" fill="#FFFFFF" stroke="#111827" stroke-width="2"/>
    <text x="500" y="355" text-anchor="middle" font-weight="700" fill="#111827">[4] /opt/oci-mysql-backup/backup.sh 실행</text>
  </g>
  <line x1="500" y1="370" x2="500" y2="398" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ── [5] 사전 검증 ── -->
  <g>
    <rect x="220" y="398" width="560" height="50" rx="8" fill="#F3F4F6" stroke="#6B7280" stroke-width="1.5"/>
    <text x="500" y="420" text-anchor="middle" font-weight="600" fill="#374151">[5] 사전 검증</text>
    <text x="500" y="438" text-anchor="middle" fill="#4B5563">flock/mysqldump/mysql/sha256sum/jq/oci 설치 · MYSQL_* 필수 env</text>
  </g>
  <!-- 실패 -->
  <line x1="780" y1="423" x2="850" y2="423" stroke="#DC2626" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#arrow-red)"/>
  <text x="815" y="415" text-anchor="middle" font-size="11" fill="#DC2626">실패</text>
  <text x="815" y="438" text-anchor="middle" font-size="11" fill="#DC2626" font-weight="600">exit 1</text>
  <line x1="500" y1="448" x2="500" y2="476" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ── [6] flock 획득 ── -->
  <g>
    <rect x="220" y="476" width="560" height="52" rx="8" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/>
    <text x="500" y="498" text-anchor="middle" font-weight="600" fill="#92400E">[6] flock 논블로킹 (FR-017)</text>
    <text x="500" y="516" text-anchor="middle" fill="#78350F">/var/lock/oci-mysql-backup.lock — backup/restore/GameDay 공용 락</text>
  </g>
  <!-- 스킵 -->
  <line x1="780" y1="502" x2="850" y2="502" stroke="#D97706" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <text x="855" y="494" font-size="11" fill="#D97706">락 점유</text>
  <text x="855" y="510" font-size="11" fill="#D97706" font-weight="600">skip+1</text>
  <text x="855" y="524" font-size="11" fill="#D97706" font-weight="600">exit 0</text>
  <line x1="500" y1="528" x2="500" y2="556" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ── [7] 임시 디렉터리 ── -->
  <g>
    <rect x="220" y="556" width="560" height="42" rx="8" fill="#F3F4F6" stroke="#6B7280" stroke-width="1.5"/>
    <text x="500" y="582" text-anchor="middle" fill="#374151">[7] mktemp /tmp/oci-mysql-backup.XXX + trap cleanup</text>
  </g>
  <line x1="500" y1="598" x2="500" y2="626" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ── [8] Step 1 mysqldump ── -->
  <g>
    <rect x="220" y="626" width="560" height="60" rx="8" fill="#DCFCE7" stroke="#16A34A" stroke-width="1.5"/>
    <text x="500" y="648" text-anchor="middle" font-weight="600" fill="#166534">[8] Step 1/5 · mysqldump → gzip -9</text>
    <text x="500" y="666" text-anchor="middle" font-family="ui-monospace, monospace" font-size="11" fill="#14532D">--single-transaction --routines --triggers --hex-blob --set-gtid-purged=OFF</text>
    <text x="500" y="680" text-anchor="middle" font-size="11" fill="#166534">약 39 MB · 18~25초</text>
  </g>
  <line x1="780" y1="650" x2="850" y2="650" stroke="#DC2626" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#arrow-red)"/>
  <text x="815" y="642" text-anchor="middle" font-size="11" fill="#DC2626">실패</text>
  <text x="815" y="656" text-anchor="middle" font-size="11" fill="#DC2626" font-weight="600">fail+1</text>
  <text x="815" y="670" text-anchor="middle" font-size="11" fill="#DC2626" font-weight="600">exit 2</text>
  <line x1="500" y1="686" x2="500" y2="714" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ── [9] Step 2 sha256 ── -->
  <g>
    <rect x="220" y="714" width="560" height="46" rx="8" fill="#DCFCE7" stroke="#16A34A" stroke-width="1.5"/>
    <text x="500" y="736" text-anchor="middle" font-weight="600" fill="#166534">[9] Step 2/5 · sha256sum</text>
    <text x="500" y="752" text-anchor="middle" font-size="11" fill="#166534">로컬 계산 · ~0.5초 · dump.sha256 생성</text>
  </g>
  <line x1="780" y1="737" x2="850" y2="737" stroke="#DC2626" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#arrow-red)"/>
  <text x="815" y="729" text-anchor="middle" font-size="11" fill="#DC2626">실패</text>
  <text x="815" y="744" text-anchor="middle" font-size="11" fill="#DC2626" font-weight="600">fail+1</text>
  <text x="815" y="758" text-anchor="middle" font-size="11" fill="#DC2626" font-weight="600">exit 3</text>
  <line x1="500" y1="760" x2="500" y2="788" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ── [10] Step 3 metadata ── -->
  <g>
    <rect x="220" y="788" width="560" height="70" rx="8" fill="#DCFCE7" stroke="#16A34A" stroke-width="1.5"/>
    <text x="500" y="810" text-anchor="middle" font-weight="600" fill="#166534">[10] Step 3/5 · collect_metadata + table_counts 병합</text>
    <text x="500" y="828" text-anchor="middle" font-size="11" fill="#166534">information_schema → schemas/tables/rows/host/dump_tool</text>
    <text x="500" y="844" text-anchor="middle" font-size="11" fill="#166534">baseline.yml 로드 → 대표 테이블 SELECT COUNT(*) → meta.json 병합</text>
  </g>
  <line x1="780" y1="820" x2="850" y2="820" stroke="#DC2626" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#arrow-red)"/>
  <text x="815" y="812" text-anchor="middle" font-size="11" fill="#DC2626">실패</text>
  <text x="815" y="827" text-anchor="middle" font-size="11" fill="#DC2626" font-weight="600">fail+1</text>
  <text x="815" y="841" text-anchor="middle" font-size="11" fill="#DC2626" font-weight="600">exit 5</text>
  <line x1="500" y1="858" x2="500" y2="886" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ── [11] Step 4 finalize ── -->
  <g>
    <rect x="220" y="886" width="560" height="42" rx="8" fill="#DCFCE7" stroke="#16A34A" stroke-width="1.5"/>
    <text x="500" y="912" text-anchor="middle" fill="#166534">[11] Step 4/5 · finalize_metadata (size · sha · duration · key 병합)</text>
  </g>
  <line x1="500" y1="928" x2="500" y2="956" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ── [12] Step 5 upload ── -->
  <g>
    <rect x="220" y="956" width="560" height="70" rx="8" fill="#DCFCE7" stroke="#16A34A" stroke-width="1.5"/>
    <text x="500" y="978" text-anchor="middle" font-weight="600" fill="#166534">[12] Step 5/5 · OCI Object Storage PUT ×3</text>
    <text x="500" y="996" text-anchor="middle" font-family="ui-monospace, monospace" font-size="11" fill="#14532D">oci --profile BACKUP_WRITER os object put …</text>
    <text x="500" y="1012" text-anchor="middle" font-size="11" fill="#166534">.sql.gz + .meta.json + .sha256 (버킷: qasker-mysql-backup)</text>
  </g>
  <line x1="780" y1="985" x2="850" y2="985" stroke="#DC2626" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#arrow-red)"/>
  <text x="815" y="977" text-anchor="middle" font-size="11" fill="#DC2626">실패</text>
  <text x="815" y="992" text-anchor="middle" font-size="11" fill="#DC2626" font-weight="600">fail+1</text>
  <text x="815" y="1006" text-anchor="middle" font-size="11" fill="#DC2626" font-weight="600">exit 4</text>
  <line x1="500" y1="1026" x2="500" y2="1054" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ── [13] state.json 갱신 ── -->
  <g>
    <rect x="220" y="1054" width="560" height="50" rx="8" fill="#CCFBF1" stroke="#0D9488" stroke-width="1.5"/>
    <text x="500" y="1076" text-anchor="middle" font-weight="600" fill="#0F766E">[13] state.json 원자적 갱신</text>
    <text x="500" y="1094" text-anchor="middle" font-size="11" fill="#134E4A">last_success_ts · last_size · last_duration · last_object_key</text>
  </g>
  <line x1="500" y1="1104" x2="500" y2="1132" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ── [14] .prom 파일 갱신 ── -->
  <g>
    <rect x="220" y="1132" width="560" height="50" rx="8" fill="#CCFBF1" stroke="#0D9488" stroke-width="1.5"/>
    <text x="500" y="1154" text-anchor="middle" font-weight="600" fill="#0F766E">[14] Prometheus textfile 갱신</text>
    <text x="500" y="1172" text-anchor="middle" font-size="11" fill="#134E4A">oci_mysql_backup.prom · 지표 6종 (counter 2 + gauge 4)</text>
  </g>
  <line x1="500" y1="1182" x2="500" y2="1210" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ── [15~17] 종료 및 로깅 ── -->
  <g>
    <rect x="220" y="1210" width="560" height="118" rx="8" fill="#DBEAFE" stroke="#2563EB" stroke-width="1.5"/>
    <text x="500" y="1232" text-anchor="middle" font-weight="600" fill="#1E40AF">[15]~[17] 종료 및 로깅</text>
    <text x="240" y="1258" fill="#1E3A8A">• trap 발동 → /tmp/oci-mysql-backup.XXX 삭제</text>
    <text x="240" y="1278" fill="#1E3A8A">• 프로세스 exit → fd 200 close → flock 자동 해제</text>
    <text x="240" y="1298" fill="#1E3A8A">• journalctl에 stdout/stderr 기록</text>
    <text x="240" y="1318" fill="#1E3A8A">• systemd: "Deactivated successfully" / "Finished"</text>
  </g>

  <!-- ── 관측 파이프라인 (비동기) ── -->
  <text x="500" y="1372" text-anchor="middle" font-size="16" font-weight="700" fill="#111827">
    ─────  비동기: 관측 파이프라인 (backup.sh 종료와 독립)  ─────
  </text>

  <g>
    <rect x="80" y="1400" width="220" height="70" rx="8" fill="#E0E7FF" stroke="#4338CA" stroke-width="1.5"/>
    <text x="190" y="1425" text-anchor="middle" font-weight="600" fill="#312E81">textfile</text>
    <text x="190" y="1443" text-anchor="middle" font-size="11" fill="#1E1B4B">/var/lib/node_exporter/</text>
    <text x="190" y="1458" text-anchor="middle" font-size="11" fill="#1E1B4B">textfile_collector/*.prom</text>
  </g>

  <g>
    <rect x="340" y="1400" width="200" height="70" rx="8" fill="#E0E7FF" stroke="#4338CA" stroke-width="1.5"/>
    <text x="440" y="1425" text-anchor="middle" font-weight="600" fill="#312E81">Alloy</text>
    <text x="440" y="1443" text-anchor="middle" font-size="11" fill="#1E1B4B">unix exporter</text>
    <text x="440" y="1458" text-anchor="middle" font-size="11" fill="#1E1B4B">(textfile block)</text>
  </g>

  <g>
    <rect x="580" y="1400" width="200" height="70" rx="8" fill="#E0E7FF" stroke="#4338CA" stroke-width="1.5"/>
    <text x="680" y="1425" text-anchor="middle" font-weight="600" fill="#312E81">원격 Prometheus</text>
    <text x="680" y="1443" text-anchor="middle" font-size="11" fill="#1E1B4B">remote_write</text>
    <text x="680" y="1458" text-anchor="middle" font-size="11" fill="#1E1B4B">수신·저장</text>
  </g>

  <g>
    <rect x="820" y="1400" width="140" height="70" rx="8" fill="#E0E7FF" stroke="#4338CA" stroke-width="1.5"/>
    <text x="890" y="1425" text-anchor="middle" font-weight="600" fill="#312E81">Grafana</text>
    <text x="890" y="1443" text-anchor="middle" font-size="11" fill="#1E1B4B">대시보드</text>
    <text x="890" y="1458" text-anchor="middle" font-size="11" fill="#1E1B4B">알림 3종</text>
  </g>

  <line x1="300" y1="1435" x2="337" y2="1435" stroke="#4338CA" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <line x1="540" y1="1435" x2="577" y2="1435" stroke="#4338CA" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <line x1="780" y1="1435" x2="817" y2="1435" stroke="#4338CA" stroke-width="2" marker-end="url(#arrow-blue)"/>

  <!-- Alerting rules -->
  <g>
    <rect x="220" y="1510" width="560" height="80" rx="8" fill="#FEF2F2" stroke="#DC2626" stroke-width="1.5"/>
    <text x="500" y="1533" text-anchor="middle" font-weight="600" fill="#991B1B">Grafana Alerting (Prometheus rules 3종)</text>
    <text x="240" y="1553" font-size="12" fill="#7F1D1D">• L2BackupFailure — increase(fail_total[2m]) &gt; 0 → 1분 내 webhook</text>
    <text x="240" y="1571" font-size="12" fill="#7F1D1D">• L2BackupStale — time() - last_success_ts &gt; 7h</text>
    <text x="240" y="1589" font-size="12" fill="#7F1D1D">• L2BackupSkipSpike — increase(skip_total[30m]) ≥ 3</text>
  </g>

  <!-- Legend -->
  <g>
    <rect x="80" y="1630" width="840" height="130" rx="8" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1"/>
    <text x="100" y="1652" font-weight="700" fill="#111827">범례</text>
    <rect x="100" y="1662" width="16" height="16" fill="#EDE9FE" stroke="#7C3AED"/>
    <text x="122" y="1675" font-size="12" fill="#374151">트리거 (systemctl/Timer)</text>
    <rect x="270" y="1662" width="16" height="16" fill="#DBEAFE" stroke="#2563EB"/>
    <text x="292" y="1675" font-size="12" fill="#374151">systemd 처리 · 종료</text>
    <rect x="440" y="1662" width="16" height="16" fill="#FEF3C7" stroke="#D97706"/>
    <text x="462" y="1675" font-size="12" fill="#374151">flock (상호 배제)</text>
    <rect x="590" y="1662" width="16" height="16" fill="#DCFCE7" stroke="#16A34A"/>
    <text x="612" y="1675" font-size="12" fill="#374151">Steps 1~5 (backup 실작업)</text>
    <rect x="100" y="1692" width="16" height="16" fill="#CCFBF1" stroke="#0D9488"/>
    <text x="122" y="1705" font-size="12" fill="#374151">메트릭·상태 갱신</text>
    <rect x="270" y="1692" width="16" height="16" fill="#E0E7FF" stroke="#4338CA"/>
    <text x="292" y="1705" font-size="12" fill="#374151">비동기 관측 파이프라인</text>
    <rect x="440" y="1692" width="16" height="16" fill="#F3F4F6" stroke="#6B7280"/>
    <text x="462" y="1705" font-size="12" fill="#374151">보조 단계</text>
    <line x1="590" y1="1700" x2="620" y2="1700" stroke="#DC2626" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#arrow-red)"/>
    <text x="628" y="1705" font-size="12" fill="#374151">실패 경로 (fail_total +1)</text>
    <text x="100" y="1735" font-size="11" fill="#6B7280">자동 재시도 없음 (FR-018) — 실패 시 다음 timer 주기(6h)에 자연 재실행</text>
  </g>
</svg>

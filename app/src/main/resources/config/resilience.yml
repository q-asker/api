# 장애 방어 및 트래픽 제어 설정

# Circuit Breaker (Resilience4j)
resilience4j:
  circuitbreaker:
    instances:
      aiServer:
        # ────────────────────────────────────────────────────────────
        # 측정 단위: 첫 퀴즈 응답까지의 시간(TTFQ).
        # AIServerAdapter가 programmatic API + firstResponseNanos 추적으로 generateQuiz 전체가 아닌
        # 첫 응답까지의 시간만 서킷브레이커에 보고한다 (코드는 ICC-332 브랜치, 배포 후 적용 예정).
        # 임계값은 TTFQ 분포(p50 13.6s, p95 27.4s, p99 ≥30s 절단, max 119s, 2026-05-03 mon.q-asker.com)에 맞춰 산정.
        # ※ 배포 전까지 resilience4j_circuitbreaker_calls_seconds 메트릭은 이전 구현(@CircuitBreaker annotation
        #   기반)으로 측정되어 TTLQ(평균 ~59.5s)를 기록 중. 배포 후 TTFQ로 전환되면 분포 재검증 필요.
        # ────────────────────────────────────────────────────────────
        # 슬라이딩 윈도우: 시간 기반 (윈도우 채우는 데 시간이 너무 오래 걸려 장애 반응성 저하 → TIME_BASED 채택)
        sliding-window-type: TIME_BASED
        # 윈도우 1080초(18분): 도메인 특화 결정 (sparse + burst 혼재 환경)
        # ⚠️ 일반 모범사례는 10~60s (지속 트래픽 가정). 본 값은 q-asker 도메인 특수성 반영.
        #
        # 도메인 특수성:
        #   - 평시 트래픽 sparse (RPS ≈ 0.0002), 시험기간 burst만 운영 critical
        #   - 일반 권고(10s window)면 burst 시 sample 1~2건으로 false positive 위험
        #
        # 산정 기준 (max burst cover):
        #   - 몰리는 구간 트래픽 실측 분포 max값 = 17분 (PromQL 검증 2026-05-07, 30d 누적)
        #   - window ≥ max burst 길이여야 "단일 burst = 한 번의 안정된 평가" 보장
        #   - window < burst면 한 burst 안에서 OPEN↔HALF_OPEN 사이클이 반복돼 false positive
        #   - 평균 burst(6분)가 아닌 max(17분)인 이유: 평균을 잡으면 긴 burst의 절반이 분열에 노출
        #   - max × 2 이상은 비권장: 회복 후에도 과거 trigger 메모리 잔존 → 회복 지연
        #   - 1080s = max(17분) + 약 1분 마진
        #
        # 재산정 트리거: max burst 길이가 변하면 window 갱신 필요 (대시보드 #25 추적)
        # 변경 이력:
        #   - 2026-05-01: 720s (max burst 12분 기준)
        #   - 2026-05-07: 1080s (max burst 17분 측정 → 상향)
        sliding-window-size: 1080
        # OPEN 60초 유지: 4중 외부 표준 합의값
        #   ① Google Cloud Blog 공식 LLM backoff max: wait_random_exponential(multiplier=1, max=60)
        #   ② Vertex AI quota window (RPM) 리셋 주기와 정확히 일치 — 핵심 타깃
        #   ③ Resilience4j 기본값
        #   ④ AWS/Microsoft Architecture Center 권장 상한 (30~60s 영역)
        #
        # 회복 시간 분포 (Google Cloud Status, Vertex Gemini 18개월 인시던트):
        #   - 짧은 hiccup: 수 초 / 429 quota 리셋: 60초 (← 60s wait의 핵심 타깃)
        #   - 503 모델 과부하: 30~60분 / 인프라 인시던트: 1시간~수일
        # 한계: 503/인시던트엔 60s 부족 → OPEN/HALF_OPEN 플래핑 발생.
        #       exponential backoff 미적용 상태에서 산업 표준 max 채택이 보수적 합리해.
        #       permitted-half-open=1과 결합 시 플래핑이 사용자 영향 최소화로 흡수됨.
        wait-duration-in-open-state:
          seconds: 60
        # Slow call 임계값 60초: TTFQ 분포 기반 — 추정 p99(38s, Log-normal 외삽) × 1.5 마진
        # 실측 TTFQ(gemini_request_first_quiz_duration_seconds): p50 13.6s, p95 27.4s, p99 ≥30s(절단), max 119s
        # Google Cloud / AWS / Microsoft 권장 30~60s 상한과 정합 (LLM 자연 long-tail 인정)
        # FP 완화는 slow-call-rate 70% + min-calls 5로 흡수 (5건 중 4건 slow에서 트리거 → 단순 변동 통과)
        # ※ actuator histogram maximum-expected-value=3m 적용 후 TTFQ p99/p99.9 정밀 측정 → 임계 재평가 예정
        slow-call-duration-threshold:
          seconds: 60
        automatic-transition-from-open-to-half-open-enabled: true

        permitted-number-of-calls-in-half-open-state: 3
        event-consumer-buffer-size: 10

        slow-call-rate-threshold: 70
        # 최소 5건: 작은 표본 노이즈 흡수 (3건은 1 slow → 33% 즉시 트리거 위험)
        # 실측 burst 활동분 mean 5.8 / max 11과 부합 → burst 내 도달 가능
        # 1 slow→20%, 2 slow→40%, 3 slow→60%, 4 slow→80% 단계적 평가
        minimum-number-of-calls: 5
        # 실패율 30% 이상이면 OPEN: GeminiInfraException 진성 장애만 카운트되어 빠른 감지 가치
        # 30일 실측 max 20% (50% 임계 도달 0회) → 50%는 사실상 죽은 트리거, 30%로 인프라 장애 즉응
        # min-calls 5 기준 2/5(40%) 또는 3/5(60%)에서 트리거 → 1건 우연 실패는 통과
        failure-rate-threshold: 30
        record-exceptions:
          - com.icc.qasker.ai.exception.GeminiInfraException
    metrics:
      enabled: true

# Rate Limiting (Bucket4j)
q-asker:
  rate-limit:
    enabled: true
    bucket-expire-minutes: 10
    max-bucket-size: 100000
    tiers:
      CRITICAL:
        capacity: 10
        refill-per-minute: 10
      HEAVY:
        capacity: 10
        refill-per-minute: 10
      WRITE:
        capacity: 20
        refill-per-minute: 20
      STANDARD:
        capacity: 10
        refill-per-minute: 10
      READ:
        capacity: 60
        refill-per-minute: 60

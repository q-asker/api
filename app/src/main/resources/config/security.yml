# 인증/보안 설정 (OAuth2, JWT)
spring:
  security:
    oauth2:
      client:
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id
        registration:
          google:
            scope:
              - profile
          kakao:
            client-name: Kakao
            authorization-grant-type: authorization_code
            client-authentication-method: client_secret_post

---
spring:
  config:
    activate:
      on-profile: local
  security:
    jwt:
      access-expiration-time: 30000 # 30초
      refresh-expiration-time: 60480 # 7일

---
spring:
  config:
    activate:
      on-profile: prod
  security:
    jwt:
      access-expiration-time: 30000 # 30초
      refresh-expiration-time: 604800 # 7일
# Q-Asker 애플리케이션 공통 설정
q-asker:
  hashid:
    min-length: 8
  async:
    task-termination-timeout-ms: 10000
  sse:
    # emitter 절대 시한. 최악 정상 생성(30문항=청크 2회 × gemini-http.call-timeout 300s + 보류 재생성 1콜 300s)을 커버
    # — ai-setting.yml call-timeout 변경 시 함께 재산정
    timeout-ms: 900000

  # 파일 업로드 검증
  file-validation:
    max-file-name-length: 255
    allowed-extensions: application/pdf,application/vnd.openxmlformats-officedocument.presentationml.presentation,application/vnd.openxmlformats-officedocument.wordprocessingml.document,application/vnd.ms-powerpoint
    max-file-size: 52_428_800

  # 관리자 이미지 업로드 검증 (문서 업로드와 규칙이 달라 분리)
  admin:
    image-upload:
      max-size: 5_242_880 # 5MB
      allowed-types: image/jpeg,image/png,image/gif,image/webp

server:
  shutdown: graceful

spring:
  lifecycle:
    timeout-per-shutdown-phase: 300s

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
      file-size-threshold: 0

  threads:
    virtual:
      enabled: true

---
spring:
  config:
    activate:
      on-profile: local

q-asker:
  slack:
    enabled: false
  web:
    frontend-deploy-url: http://localhost:5173

---
spring:
  config:
    activate:
      on-profile: prod

q-asker:
  slack:
    enabled: true
  web:
    frontend-deploy-url: https://www.q-asker.com

# 데이터베이스, JPA, 캐시 설정
spring:
  jpa:
    open-in-view: false
    properties:
      hibernate:
        default_batch_fetch_size: 100
        # Phase 2 해설 배치 저장(saveExplanations)의 N개 UPDATE를 JDBC 배치로 묶어 DB 왕복 감소.
        jdbc:
          batch_size: 30
        order_updates: true
        order_inserts: true

---
spring:
  config:
    activate:
      on-profile: local
  cache:
    type: none
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    locations: classpath:db/migration

---
spring:
  config:
    activate:
      on-profile: prod
  cache:
    type: simple
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    locations: classpath:db/migration

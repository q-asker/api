# Q-Asker 애플리케이션 공통 설정
q-asker:
  hashid:
    min-length: 8
  ai:
    chat-timeout-ms: 90000
  async:
    task-termination-timeout-ms: 10000
  sse:
    timeout-ms: 300000
  rate-limit:
    enabled: true
    bucket-expire-minutes: 10
    max-bucket-size: 100000
    tiers:
      CRITICAL:
        capacity: 5
        refill-per-minute: 5
      HEAVY:
        capacity: 10
        refill-per-minute: 10
      WRITE:
        capacity: 20
        refill-per-minute: 20
      STANDARD:
        capacity: 10
        refill-per-minute: 10
      READ:
        capacity: 60
        refill-per-minute: 60

---
spring:
  config:
    activate:
      on-profile: local

q-asker:
  slack:
    enabled: false
  web:
    frontend-deploy-url: http://localhost:5173
    frontend-dev-url: http://localhost:5173

---
spring:
  config:
    activate:
      on-profile: prod

q-asker:
  slack:
    enabled: true
  web:
    frontend-deploy-url: https://www.q-asker.com
    frontend-dev-url: http://q-asker-test-webpage-20251211.s3-website.ap-northeast-2.amazonaws.com

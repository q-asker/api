# AI (Google Gemini) 설정
spring:
  ai:
    retry:
      max-attempts: 1
    google:
      genai:
        chat:
          options:
            temperature: 0.0
            top-k: 10
            top-p: 0.6
            model: gemini-3-flash-preview
            thinking-budget: 0
            max-output-tokens: 65536


q-asker:
  ai:
    chat-timeout-ms: 180000
    chunk:
      max-count-variants: 5

# AI (Google Gemini) 설정
spring:
  ai:
    retry:
      max-attempts: 2
      backoff:
        initial-interval: 1000ms
      on-client-errors: false
      # ┌ 화이트리스트: Vertex AI 공식 retryable 코드만 명시
      # ├ 503 UNAVAILABLE이 가장 빈출 (Google 점검/과부하)
      # ├ 500 INTERNAL은 입력 크기 문제 가능성 → retry 후 동일 실패 시 GeminiInfraException으로 전파
      # └ 408/504는 타임아웃 — q-asker chat-timeout-ms(360000) 내 발생 시만 의미
      on-http-codes: [ 408, 429, 500, 502, 503, 504 ]
      # ┌ 명시적 블랙리스트 (방어적 — on-http-codes로 이미 화이트리스트지만 안전)
      # ├ 400/401/403/404: 영구 실패, 입력/인증/권한 문제
      # └ 499: 클라이언트 취소 (사용자 SSE 연결 끊음) → retry 의미 없음
      exclude-on-http-codes: [ 400, 401, 403, 404, 499 ]

    google:
      genai:
        chat:
          options:
            temperature: 1.0
            model: gemini-3-flash-preview
            max-output-tokens: 20000
            thinking-level: low

q-asker:
  ai:
    chat-timeout-ms: 360000
    chunk:
      max-count-variants: 5

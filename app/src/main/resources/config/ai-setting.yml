# AI (Google Gemini) 설정
spring:
  ai:
    retry:
      max-attempts: 1
    google:
      genai:
        chat:
          model: gemini-3-flash-preview
          temperature: 1.0
          max-output-tokens: 20000
          thinking-level: MINIMAL

q-asker:
  ai:
    chat-timeout-ms: 500000
    cache-ttl: 15m          # 컨텍스트 캐시 TTL (인터리빙 세션 커버)
    # 스트리밍 시한 계층 (connect < read < call). 안쪽 시한이 바깥보다 짧아야
    # 각 계층이 자기 실패를 자기 이름의 예외로 먼저 잡는다 — 순서가 무너지면 바깥층이
    # 안쪽 실패를 가로채 서킷 계수·로그 분류가 오염된다.
    # 임계 레시피: 관측 성공 최대 +10% — 그 아래는 실존 성공을 자르는 오탐 (측정 2026-07-11, 78일 스냅샷).
    gemini-http:
      # TCP+TLS 연결 수립까지의 시한. 정상 연결은 수백 ms에 끝나므로 10초를 넘기면
      # 성공 가능성이 관측상 0 — "연결 불가 = 무조건 인프라 장애"라는 가장 깨끗한 신호가 된다.
      # 발화: SocketTimeoutException(connect) → GeminiInfraException → 서킷 실패 계수.
      connect-timeout: 10s
      # 무음 갭 컷: 바이트와 바이트 사이 침묵이 이 시간을 넘으면 절단. 데이터가 올 때마다
      # 시계가 리셋되므로 "느리지만 살아있는" 스트림은 자르지 않는다. Gemini 빈 응답형
      # 매달림(첫 문제 없이 2~3분 침묵 후 NPE)을 300s+ 이전에 끊는 것이 목적.
      # 근거: 첫 문제 도착(TTFQ) 관측 최대 134.9s +10%. 단서: 청크 중간의 무음 갭 분포는
      # 미측정 — 발화 건이 오탐(재시도 시 성공)이면 임계 상향이 갱신 조건.
      read-timeout: 150s
      # 청크 HTTP 호출 1건의 총 시한 (연결~응답 본문 완독, 리셋 없는 절대 시계).
      # 근거: 청크 소요 관측 최대 274.3s + 여유 ~9%(300−274.3≈26s). 이 값이 곧 '성공 가능한 최대 소요' —
      # 300s를 넘으면 성공이 아니라 실패(timeout)로 변환돼 서킷 실패 경로가 집계한다 (slow-call 경로는 비활성).
      # 주의(마진): 여유가 얇아 300~350s대 대형 문서가 실패로 잘릴 수 있음 — 관측 최대 상승 시 재검토.
      # 주의: GeminiClientConfig가 customHttpClient를 쓰므로 SDK의 HttpOptions.timeout은 무시된다.
      call-timeout: 300s
    chunk:
      chunk-size: 15
    multiple:
      chunk-mode: 1  # 1: 단일 호출, 2: 멀티턴 순차 (A→B→C 중복방지), 3: 패턴별 병렬 (A/B/C)
    essay:
      grading-model: gemini-3.1-flash-lite
      # 채점 모델 토큰 단가 (USD per 1M tokens)
      price-input-per-1m: 0.25
      price-output-per-1m: 1.50
    generation:
      # 생성 모델(Gemini 3 Flash Preview) 토큰 단가 (USD per 1M tokens)
      price-input-per-1m: 0.50
      price-cache-read-per-1m: 0.050
      price-output-per-1m: 3.00
    quality:
      # 문항 품질 검증 모델 — 경량 flash-lite 계열(저비용·저지연)
      verify-model: gemini-3.1-flash-lite
      # 검증 모델 토큰 단가 (USD per 1M tokens)
      price-input-per-1m: 0.25
      price-cache-read-per-1m: 0.025  # Pass 1 원문 대조 캐시 읽기 단가(추정) — 입력의 10%
      price-output-per-1m: 1.50
      # 적용 검증 항목·항목별 엄격도 — 운영자가 조절(FR-011)
      # 값: strict(엄격) / normal(보통) / off(미적용). 필수 항목은 항상 평가됨.
      criteria:
        # 전 유형 공통 필수(FR-002b) — 항상 평가
        construction-strategy: strict     # ① 문제 구성전략이 유형별 GuideLine에 부합하는가
        instruction-application: strict    # ② 사용자 지시(customInstruction)가 정확히 반영됐는가
        # 객관형(MULTIPLE/OX/BLANK)
        single-correct-answer: strict      # 정답이 유일한가
        answer-grounded-in-source: strict  # 정답이 sourceAnchor 원문 근거에 부합하는가
        distractors-plausible: normal      # 오답이 그럴듯한가
        no-outside-knowledge: normal       # 문항 밖 지식이 불필요한가
        shortcut-prevention: normal        # 내용 없이 어조·선지길이·정답 온건함으로 정답을 고를 수 없는가(트레이드오프 오답 위험도 대칭)
        cognitive-depth: normal            # 단일 사실 암기가 아니라 교차 대조·다단계 추론을 요구하는가
        # 서술형(ESSAY)
        model-answer-basis: strict         # 모범답안이 원문에 근거하는가
        rubric-consistency: strict         # 질문↔모범답안↔채점 루브릭 3자 정합

# AI (Google Gemini) 설정
spring:
  ai:
    retry:
      max-attempts: 1
    google:
      genai:
        chat:
          options:
            temperature: 1.0
            model: gemini-3-flash-preview
            max-output-tokens: 20000
            thinking-level: low

q-asker:
  ai:
    chat-timeout-ms: 360000
    chunk:
      max-count-variants: 5
    multiple:
      chunk-mode: 1  # 1: 단일 호출, 2: 멀티턴 순차 (A→B→C 중복방지), 3: 패턴별 병렬 (A/B/C)

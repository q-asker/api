# 테스트 및 CI 공용 프로파일
# - 테스트: @ActiveProfiles("test")
# - CI: --spring.profiles.active=test

# Jasypt: CI에서 JASYPT_ENCRYPTOR_PASSWORD 없이 기동 가능하도록 더미 키 설정
# ENC() 값은 잘못된 값으로 복호화되지만, 아래 더미 설정으로 오버라이드되므로 무관
jasypt:
  encryptor:
    password: ci-dummy-jasypt-key

# OCI: CI에서 ~/.oci/config 없이 기동 가능하도록 더미 설정
oci:
  object-storage:
    region: ci-dummy
    config-file-path: /dev/null
    profile: DEFAULT
    namespace: ci-dummy
    bucket-name: ci-dummy

spring:
  cache:
    type: simple

  datasource:
    url: jdbc:h2:mem:test;DB_CLOSE_DELAY=-1;NON_KEYWORDS=USER
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  flyway:
    enabled: false

  # 테스트/CI에서 불필요한 자동 설정 제외
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration
      - org.jodconverter.boot.autoconfigure.JodConverterLocalAutoConfiguration

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ci-dummy
            client-secret: ci-dummy
            redirect-uri: http://localhost:8080/login/oauth2/code/google
          kakao:
            client-id: ci-dummy
            client-secret: ci-dummy
            redirect-uri: http://localhost:8080/login/oauth2/code/kakao

    jwt:
      secret: ci-dummy-secret-key
      access-expiration-second: 30
      refresh-expiration-second: 60480

  ai:
    google:
      genai:
        project-id: ci-dummy-project
        location: us-central1
        chat:
          options:
            model: gemini-3-flash-preview
            thinking-budget: 0

q-asker:
  ai:
    gcs:
      bucket-name: ci-dummy

  hashid:
    salt: ci-dummy-salt
    min-length: 8

  slack:
    enabled: false
    webhook-url-notify: http://localhost

  web:
    frontend-deploy-url: http://localhost:3000

cdn:
  image-base-url: http://localhost
  file-base-url: http://localhost

jodconverter:
  local:
    enabled: false
    office-home: /usr/lib/libreoffice
    port-numbers: 2002, 2003, 2004, 2005, 2006

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: false

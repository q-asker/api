# 테스트 및 CI 공용 프로파일
# - 테스트: @ActiveProfiles("test")
# - CI: --spring.profiles.active=test

spring:
  cache:
    type: simple

  datasource:
    url: jdbc:h2:mem:test;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false

  # 테스트/CI에서 불필요한 자동 설정 제외
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration
      - org.jodconverter.boot.autoconfigure.JodConverterLocalAutoConfiguration

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ci-dummy
            client-secret: ci-dummy
            redirect-uri: http://localhost:8080/login/oauth2/code/google
          kakao:
            client-id: ci-dummy
            client-secret: ci-dummy
            redirect-uri: http://localhost:8080/login/oauth2/code/kakao

    jwt:
      secret: ci-dummy-secret-key
      refresh-expiration-time: 60480

  ai:
    google:
      genai:
        project-id: ci-dummy-project
        location: us-central1
        chat:
          options:
            model: gemini-3-flash-preview
            thinking-budget: -1

q-asker:
  hashid:
    salt: ci-dummy-salt
    min-length: 8

  slack:
    enabled: false
    webhook-url-notify: http://localhost

  web:
    frontend-deploy-url: http://localhost:3000

cdn:
  base-url: http://localhost

jodconverter:
  local:
    enabled: false
    office-home: /usr/lib/libreoffice
    port-numbers: 2002, 2003, 2004, 2005, 2006

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: false
